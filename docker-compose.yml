services:
  stock-portfolio-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-portfolio-api:latest
    container_name: stock-portfolio-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      BRAPI_URL: ${BRAPI_URL:-https://brapi.dev}
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
    restart: unless-stopped
